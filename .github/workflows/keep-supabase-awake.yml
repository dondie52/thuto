name: Keep Supabase Awake

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL}" ] || [ -z "${SUPABASE_ANON_KEY}" ]; then
            echo "::notice::Skipping Supabase keep-alive because VITE_SUPABASE_URL or VITE_SUPABASE_ANON_KEY is not configured."
            exit 0
          fi

          status="$(
            curl --silent --show-error \
              --output /tmp/supabase-keepalive.json \
              --write-out "%{http_code}" \
              --max-time 20 \
              "${SUPABASE_URL%/}/rest/v1/" \
              --header "apikey: ${SUPABASE_ANON_KEY}" \
              --header "Authorization: Bearer ${SUPABASE_ANON_KEY}"
          )"

          if [ "${status}" -lt 200 ] || [ "${status}" -ge 400 ]; then
            echo "Supabase keep-alive ping failed with HTTP ${status}."
            cat /tmp/supabase-keepalive.json
            exit 1
          fi

          echo "Supabase keep-alive ping succeeded with HTTP ${status}."
