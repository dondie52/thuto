<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-label="Thuto app story preview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.48" stop-color="#172554"/>
      <stop offset="1" stop-color="#115e59"/>
    </linearGradient>
    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M 46 0 L 0 0 0 46" fill="none" stroke="rgba(255,255,255,0.16)" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#grid)" opacity="0.5"/>
  <g transform="translate(70 58)">
    <rect width="72" height="72" rx="24" fill="#fff"/>
    <text x="99" y="42" fill="#fff" font-family="Figtree, Arial, sans-serif" font-size="44" font-weight="900">Thuto</text>
    <text x="101" y="70" fill="#99f6e4" font-family="Figtree, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="5">BOTSWANA UNIVERSITY COMPANION</text>
  </g>
  <g transform="translate(70 190)">
    <text x="0" y="0" fill="#ffd166" font-family="Figtree, Arial, sans-serif" font-size="21" font-weight="800" letter-spacing="6">SCROLL STORY</text>
    <text x="0" y="84" fill="#fff" font-family="Figtree, Arial, sans-serif" font-size="64" font-weight="900">Find courses you</text>
    <text x="0" y="148" fill="#fff" font-family="Figtree, Arial, sans-serif" font-size="64" font-weight="900">actually qualify for.</text>
  </g>
  <g transform="translate(790 80)" filter="url(#shadow)">
    <rect width="392" height="580" rx="44" fill="#111827"/>
    <rect x="10" y="10" width="372" height="560" rx="36" fill="#fbfaf6"/>
    <rect x="132" y="22" width="128" height="24" rx="12" fill="#111827"/>
    <text x="38" y="94" fill="#0f766e" font-family="Figtree, Arial, sans-serif" font-size="18" font-weight="900" letter-spacing="3">BGCSE RESULTS</text>
    <text x="38" y="136" fill="#111827" font-family="Figtree, Arial, sans-serif" font-size="34" font-weight="900">Build your score</text>
    <g font-family="Figtree, Arial, sans-serif" font-weight="800" font-size="22">
      <rect x="38" y="180" width="316" height="60" rx="22" fill="#fff" stroke="#d8d1c4"/>
      <text x="58" y="218" fill="#1f2937">English</text>
      <rect x="286" y="195" width="44" height="32" rx="16" fill="#0f766e"/>
      <text x="300" y="219" fill="#fff">A</text>
      <rect x="38" y="254" width="316" height="60" rx="22" fill="#fff" stroke="#d8d1c4"/>
      <text x="58" y="292" fill="#1f2937">Mathematics</text>
      <rect x="286" y="269" width="44" height="32" rx="16" fill="#0f766e"/>
      <text x="300" y="293" fill="#fff">B</text>
      <rect x="38" y="328" width="316" height="60" rx="22" fill="#fff" stroke="#d8d1c4"/>
      <text x="58" y="366" fill="#1f2937">Biology</text>
      <rect x="286" y="343" width="44" height="32" rx="16" fill="#0f766e"/>
      <text x="300" y="367" fill="#fff">A</text>
      <rect x="38" y="420" width="316" height="96" rx="28" fill="#ffd166"/>
      <text x="62" y="456" fill="#111827" font-size="18" letter-spacing="3">INDICATIVE POINTS</text>
      <text x="62" y="506" fill="#111827" font-size="58">45</text>
    </g>
  </g>
  <rect x="70" y="670" width="520" height="8" rx="4" fill="rgba(255,255,255,0.2)"/>
  <rect x="70" y="670" width="180" height="8" rx="4" fill="#ffd166"/>
</svg>
